# render.yaml
services:
  - type: web
    name: project-star-safeguarding
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSPHRASE
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: project-star-db
          property: connectionString

databases:
  - name: project-star-db
    databaseName: project_star
    plan: starter # Free tier
