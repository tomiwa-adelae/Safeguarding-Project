# ═══════════════════════════════════════════════════════════════
# Nginx Main Configuration
# Project STAR Safeguarding Course
# ═══════════════════════════════════════════════════════════════

user  nginx;

# Automatically set to number of CPU cores available
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    # Maximum simultaneous connections per worker
    worker_connections  1024;
    # Accept as many connections as possible per event
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Security ──────────────────────────────────────────────────
    # Hide Nginx version from response headers and error pages
    server_tokens off;

    # ── Gzip Compression ──────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/x-component
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ── Rate Limiting Zones ───────────────────────────────────────
    # Nginx-level rate limiting as a first line of defence
    # (Express also rate-limits at the app level)
    limit_req_zone  $binary_remote_addr  zone=api:10m    rate=30r/m;
    limit_req_zone  $binary_remote_addr  zone=login:10m  rate=10r/m;

    # ── Proxy Settings ────────────────────────────────────────────
    proxy_http_version      1.1;
    proxy_buffering         on;
    proxy_buffer_size       4k;
    proxy_buffers           8 8k;
    proxy_busy_buffers_size 16k;
    proxy_read_timeout      60s;
    proxy_connect_timeout   10s;
    proxy_send_timeout      60s;

    # ── Include site-specific virtual host configs ────────────────
    include /etc/nginx/conf.d/*.conf;
}
