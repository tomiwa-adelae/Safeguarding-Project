# ═══════════════════════════════════════════════════════════════
# Nginx Virtual Host: safeguarding.projectstarlgs.com
# Project STAR Safeguarding Course
# ═══════════════════════════════════════════════════════════════

# ── Server 1: HTTP — ACME challenge + redirect to HTTPS ──────────
server {
    listen 80;
    listen [::]:80;
    server_name safeguarding.zionstand.com;

    # Certbot ACME challenge — Let's Encrypt places verification
    # files here during certificate issuance and renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Internal health check — used by the docker-compose healthcheck.
    # Returns 200 directly (no proxy, no HTTPS redirect) so that wget
    # running inside the Nginx container can verify Nginx is alive.
    location = /healthz {
        access_log off;
        return 200 'ok\n';
        add_header Content-Type text/plain;
    }

    # Redirect all other HTTP traffic to HTTPS permanently
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Server 2: HTTPS — Main application ───────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name safeguarding.zionstand.com;

    # ── SSL Certificates (managed by Certbot) ──────────────────
    ssl_certificate     /etc/letsencrypt/live/safeguarding.zionstand.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/safeguarding.zionstand.com/privkey.pem;

    # ── SSL Hardening ───────────────────────────────────────────
    # Only allow TLS 1.2 and 1.3 (drops support for old/insecure versions)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Mozilla "Intermediate" cipher suite — strong but broadly compatible.
    # DHE-RSA-AES128-GCM-SHA256 requires the ssl_dhparam file below.
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # DH parameters for the DHE cipher above.
    # Generated by init-letsencrypt.sh and stored alongside the cert files.
    # The certbot/conf volume is mounted read-only at /etc/letsencrypt in Nginx.
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Session caching reduces handshake overhead for returning visitors
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling: server proactively sends cert validity proof,
    # improving load time and protecting user privacy
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Security Headers (complement Express Helmet) ────────────
    # HSTS: force HTTPS for 1 year, including subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options     "nosniff"                                      always;
    add_header X-XSS-Protection           "1; mode=block"                                always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"     always;

    # ── Request Size Limit ──────────────────────────────────────
    # Match the 1MB limit set in Express (express.json({ limit: '1mb' }))
    client_max_body_size 1m;

    # ── Logging ─────────────────────────────────────────────────
    access_log /var/log/nginx/safeguarding-zionstand-access.log main;
    error_log  /var/log/nginx/safeguarding-zionstand-error.log  warn;

    # ── Static Asset Caching ────────────────────────────────────
    # Serve static files from the upstream app but instruct browsers
    # to cache them aggressively (images, fonts, CSS, JS)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        proxy_pass         http://app:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # ── Rate Limiting on Sensitive API Endpoints ────────────────
    # Login endpoint — 10 requests/min per IP before Nginx rejects
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://app:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # All other API routes — 30 requests/min per IP
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://app:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Main Proxy to Node.js App ───────────────────────────────
    location / {
        proxy_pass          http://app:3000;

        # Required headers so Express gets the real client info
        # (needed for: secure cookies, rate limiting, IP logging)
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    X-Forwarded-Host  $host;
        proxy_set_header    X-Forwarded-Port  $server_port;

        # Support WebSocket upgrades (future-proof)
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";

        # Timeouts
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        # Disable buffering for SSE/streaming if ever needed
        proxy_buffering off;
    }
}
